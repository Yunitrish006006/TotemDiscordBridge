name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: Yunitrish006006/TotemCore
          path: TotemCore
          ref: master
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - run: chmod +x gradlew
      - run: ./gradlew test --no-daemon --stacktrace
      - name: Verify Core + Discord Dedicated Server startup
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p run/server/mods
          printf 'eula=true\n' > run/server/eula.txt
          ./gradlew normalizeFabricApiTweakersForNamedDevRuntime --no-daemon --stacktrace
          fabric_api_jar="$(find "$HOME/.gradle/caches/modules-2/files-2.1/net.fabricmc.fabric-api/fabric-api/0.154.2+26.2" -type f -name 'fabric-api-0.154.2+26.2.jar' | head -n 1)"
          test -n "${fabric_api_jar}"
          cp "${fabric_api_jar}" run/server/mods/
          set +e
          timeout --signal=TERM --kill-after=15s 75s ./gradlew runServer --no-daemon --stacktrace > discord-server.log 2>&1
          status=$?
          set -e
          if [ "${status}" -ne 124 ]; then
            cat discord-server.log
            exit "${status}"
          fi
          test "${status}" -eq 124
          grep -F 'TotemCore API 1.0 initialized without gameplay registration' discord-server.log
          grep -F 'TotemDiscordBridge initialized' discord-server.log
          grep -F 'Done (' discord-server.log
