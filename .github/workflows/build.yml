name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: Yunitrish006006/TotemCore
          path: TotemCore
          ref: master
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - run: chmod +x gradlew
      - run: ./gradlew build --no-daemon --stacktrace
      - name: Verify standalone Discord distribution layout
        shell: bash
        run: |
          set -euo pipefail
          jar_file="build/libs/totem-discord-bridge-0.1.0-SNAPSHOT.jar"
          test -f "${jar_file}"
          unzip -p "${jar_file}" fabric.mod.json | grep -F 'dev.totem.discord.TotemDiscordBridge'
          unzip -p "${jar_file}" fabric.mod.json | grep -F 'dev.totem.discord.TotemDiscordBridgeClient'
          jar tf "${jar_file}" | grep -F 'dev/totem/discord/mixin/DiscordBridgeTransientNotificationMixin.class'
          ! jar tf "${jar_file}" | grep -q '^com/adaptor/deadrecall/.*\.class$'
